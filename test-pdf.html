function test(){
  var jsPDF = window.jspdf.jsPDF;
  // CRITICAL: unit must be 'pt' so all coordinates are in points
  var doc = new jsPDF({orientation:'portrait', unit:'pt', format:'a4'});
  var PW=595.28, PH=841.89;

  function xp(mm){ return mm*(PW/210); }
  function yp(mm){ return mm*(PH/297); }

  var L=xp(18), R=xp(185), LH=15;

  // Background
  doc.addImage(INV_TMPL, 'PNG', 0, 0, PW, PH);

  // INVOICE title
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.setTextColor('#C0153A');
  doc.text('INVOICE', R, yp(58), {align:'right'});

  // Number
  doc.setFont('helvetica','normal');
  doc.setFontSize(13);
  doc.setTextColor('#333333');
  doc.text('INV-001', R, yp(64), {align:'right'});
  doc.text('PO# PO-12345', R, yp(70), {align:'right'});
  doc.setTextColor('#666666');
  doc.text('June 11, 2026', R, yp(76), {align:'right'});

  // Bill To — starts at 86mm from top
  var byS = yp(86);
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor('#C0153A');
  doc.text('Bill To:', L, byS);

  var billLines = ['Sweet Events Co.','200 Maple Ave','Toronto ON','Att: Sarah Johnson'];
  doc.setFont('helvetica','normal');
  doc.setTextColor('#333333');
  billLines.forEach(function(ln,i){ doc.text(ln, L, byS+(i+1)*LH); });
  var billEndY = byS + billLines.length*LH;

  // For
  var FX = xp(108);
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor('#C0153A');
  doc.text('For:', FX, byS);

  var forLines = ['Ice Cream Service','Feb 18th','1 hour'];
  doc.setFont('helvetica','normal');
  doc.setTextColor('#333333');
  forLines.forEach(function(ln,i){ doc.text(ln, FX, byS+(i+1)*LH); });
  var forEndY = byS + (forLines.length+1)*LH;

  // Shifts
  forEndY += 8;
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#333333');
  doc.text('Shifts:', FX, forEndY);
  doc.setFont('helvetica','normal');
  var shifts=[['Shift 1','Morning','8am-12pm'],['Shift 2','Afternoon','12pm-4pm'],['Shift 3','Evening','4pm-8pm']];
  shifts.forEach(function(s,i){
    doc.text(s[0]+' - '+s[1]+'   '+s[2], FX+4, forEndY+(i+1)*13);
  });
  forEndY += shifts.length*13+8;

  // Table
  var tableTopY = Math.max(billEndY, forEndY)+24;
  var tW=R-L, cAMT=40, cPPP=tW*0.38, cDESC=tW-cPPP-cAMT, pppCX=L+cDESC+cPPP/2;
  var ROW_H=18, HDR_H=20;

  doc.setDrawColor('#333333'); doc.setLineWidth(1.5);
  doc.rect(L, tableTopY-HDR_H, tW, HDR_H, 'S');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#333333');
  doc.text('DESCRIPTION', L+6, tableTopY-7);
  doc.text('Value per person*', pppCX, tableTopY-7, {align:'center'});
  doc.text('AMOUNT', R-6, tableTopY-7, {align:'right'});

  var items=[
    {desc:'Travel fees',ppp:'',qty:'',amt:170},
    {desc:'Ice Cream Sundae',ppp:8,qty:100,amt:''},
    {desc:'Ice Cream Only',ppp:7,qty:100,amt:''},
    {desc:'Extend Service',ppp:'',qty:'',amt:350}
  ];
  var sub=0;
  items.forEach(function(it,idx){
    var amt=(it.ppp!==''&&it.qty!=='')?parseFloat(it.ppp)*parseFloat(it.qty):parseFloat(it.amt);
    sub+=amt;
    var ry=tableTopY+idx*ROW_H;
    if(idx%2===0){doc.setFillColor(254,240,243);doc.rect(L,ry,tW,ROW_H,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#333333');
    doc.text(it.desc, L+6, ry+12);
    if(it.ppp!==''&&it.qty!=='') doc.text('$ '+parseFloat(it.ppp).toFixed(2), pppCX, ry+12, {align:'center'});
    doc.text('$ '+amt.toFixed(2), R-6, ry+12, {align:'right'});
    doc.setDrawColor('#E0E0E0'); doc.setLineWidth(0.2); doc.line(L,ry,R,ry);
  });
  var tableBotY=tableTopY+items.length*ROW_H;
  doc.setDrawColor('#333333'); doc.setLineWidth(1.5);
  doc.rect(L,tableTopY-HDR_H,tW,HDR_H+items.length*ROW_H,'S');

  // Number of persons
  var NOP_HDR=HDR_H,NOP_ROW=ROW_H,NOP_TOT=NOP_HDR+NOP_ROW,nopTopY=tableBotY+4;
  doc.setDrawColor('#333333'); doc.setLineWidth(1.5);
  doc.rect(L,nopTopY,tW,NOP_TOT,'S');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#333333');
  doc.text('Number of persons',L+tW/2,nopTopY+NOP_HDR-7,{align:'center'});
  doc.setDrawColor('#E0E0E0'); doc.setLineWidth(0.2);
  doc.line(L,nopTopY+NOP_HDR,R,nopTopY+NOP_HDR);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor('#333333');
  doc.text('*Minimum Persons Required',L+6,nopTopY+NOP_HDR+NOP_ROW-6);
  doc.setFont('helvetica','bold');
  doc.text('200',R-6,nopTopY+NOP_HDR+NOP_ROW-6,{align:'right'});

  // Totals
  var hst=sub*0.13,tot=sub+hst,cc=tot*1.03,TX=xp(120),totTopY=nopTopY+NOP_TOT+44;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor('#333333');
  doc.text('Subtotal',TX,totTopY); doc.text('$ '+sub.toFixed(2),R,totTopY,{align:'right'});
  doc.text('Tax total',TX,totTopY+16); doc.text('$ '+hst.toFixed(2),R,totTopY+16,{align:'right'});
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor('#000000');
  doc.text('Total',TX,totTopY+34); doc.text('$ '+tot.toFixed(2),R,totTopY+34,{align:'right'});
  doc.setDrawColor('#CCCCCC'); doc.setLineWidth(0.4); doc.line(TX,totTopY+38,R,totTopY+38);
  doc.setTextColor('#C0153A');
  doc.text('Credit Card Pay *',TX,totTopY+54); doc.text('$ '+cc.toFixed(2),R,totTopY+54,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor('#999999');
  doc.text('HST TAX # 823586508 RT0001   |   Tax rate: 13%',L,totTopY+16);

  // Footer
  var fy=totTopY+82;
  [[false,'#C0153A','*If you are paying with credit card, there will be a 3% additional fee added to the balance.'],
   [true,'#333333','Make all checks payable to Crazy Cravings or E-Transfer to info@crazycravings.ca'],
   [false,'#333333','If you have any questions concerning this invoice, contact Jeff Coates, (905) 906-8657'],
   [true,'#C0153A','Invoice are NET 30 DAYS - Late invoices are subject to 3% fee per month']
  ].forEach(function(row){
    doc.setFont('helvetica',row[0]?'bold':'normal'); doc.setFontSize(7.5); doc.setTextColor(row[1]);
    doc.text(row[2],L,fy); fy+=13;
  });
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor('#333333');
  doc.text('Thank you for your business!',PW/2,fy+18,{align:'center'});

  doc.save('test-invoice.pdf');
}
